<div class="min-vh-100 d-flex align-items-center" style="background: #1a237e;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card p-4 shadow-lg" style="border-radius: 16px;">
          <div class="text-center mb-4">
            <i class="bi bi-book-fill" style="font-size: 3rem;"></i>
            <h4 class="fw-bold text-primary mt-2">CUNORI</h4>
            <p class="text-muted small">Sistema de expedientes</p>
          </div>

          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" [(ngModel)]="nombre" placeholder="Ingresa tu usuario">
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" [(ngModel)]="contrasenia" placeholder="Ingresa tu contraseña">
          </div>
          <button class="btn btn-primary w-100" (click)="login()">
            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
